1. index.html 
<!DOCTYPE html>

<html lang="kk">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тойға шақырту</title>

<style>

body{

margin:0;

font-family:Arial,sans-serif;

background:#fdf8f5;

color:#333;

text-align:center;

}

.hero{

padding:70px 20px;

background:#efe4dc;

}

h1{

font-size:40px;

margin:0;

}

h2{

margin-top:10px;

font-weight:normal;

}

.section{

padding:50px 20px;

}

.timer{

font-size:30px;

font-weight:bold;

color:#b07b55;

margin-top:20px;

}

.button{

display:inline-block;

padding:15px 35px;

background:#b07b55;

color:white;

text-decoration:none;

border-radius:40px;

margin-top:20px;

}

.gallery{

display:grid;

grid-template-columns:1fr 1fr;

gap:10px;

padding:20px;

}

.gallery img{

width:100%;

border-radius:15px;

}

iframe{

width:100%;

height:300px;

border:none;

border-radius:20px;

}

</style>

</head>

<body>

<div class="hero">

<h1>Аружан ❤️ Дәулет</h1>

<h2>Сіздерді біздің қуанышымызға ортақ болуға шақырамыз</h2>

<p>12 Қыркүйек 2026</p>

<div class="timer" id="timer"></div>

<a class="button" href="#map">Мекенжай</a>

</div>

<div class="section">

<h2>📸 Біздің естеліктер</h2>

<div class="gallery">

<img src="https://picsum.photos/400/500?1">

<img src="https://picsum.photos/400/500?2">

<img src="https://picsum.photos/400/500?3">

<img src="https://picsum.photos/400/500?4">

</div>

</div>

<div class="section" id="map">

<h2>📍 Той өтетін жер</h2>

<iframe src="https://maps.google.com/maps?q=Almaty&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>

<a class="button" href="https://forms.gle/">Келемін</a>

</div>

<script>

let target=new Date("Sep 12, 2026 18:00:00").getTime();

setInterval(function(){

let now=new Date().getTime();

let distance=target-now;

let days=Math.floor(distance/(1000*60*60*24));

let hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));

let minutes=Math.floor((distance%(1000*60*60))/60000);

document.getElementById("timer").innerHTML=

days+" күн "+hours+" сағат "+minutes+" минут";

},1000);

</script>

</body>

</html>
